config:
  default: true
  # Line length is impractical for prose, URLs, and code examples
  MD013: false

ignores:
  # Machine-generated by semantic-release
  - CHANGELOG.md
  # Standard license text does not start with a heading
  - LICENSE.md
  - node_modules/
  # Nested node_modules from git worktrees (e.g. Claude Code) the top-level
  # node_modules/ glob does not match
  - '**/node_modules/'
  # Linked git worktrees are full repo checkouts (their own node_modules,
  # CHANGELOG, LICENSE); never lint them from the parent repo
  - .claude/
