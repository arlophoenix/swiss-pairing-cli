config:
  default: true
  # Line length is impractical for prose, URLs, and code examples
  MD013: false

# Defer to git for what is part of the project; never lint untracked/ignored
# content (node_modules, nested worktrees, build output, etc.)
gitignore: true

ignores:
  # Machine-generated by semantic-release
  - CHANGELOG.md
  # Standard license text does not start with a heading
  - LICENSE.md
